name: Knock branch preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

# Prevent concurrent runs for the same PR to avoid branch conflicts
concurrency:
  group: knock-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Knock CLI
        run: npm install -g @knocklabs/cli@latest

      - name: Derive Knock branch name
        id: branch
        run: |
          KNOCK_BRANCH="pr-${{ github.event.pull_request.number }}"
          echo "name=$KNOCK_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Switch to Knock branch (creates it if it doesn't exist)
        env:
          KNOCK_SERVICE_TOKEN: ${{ secrets.KNOCK_SERVICE_TOKEN }}
        run: knock branch switch ${{ steps.branch.outputs.name }} --create

      - name: Push all resources to branch
        env:
          KNOCK_SERVICE_TOKEN: ${{ secrets.KNOCK_SERVICE_TOKEN }}
        run: knock push --knock-dir=.

      - name: Commit changes on branch
        env:
          KNOCK_SERVICE_TOKEN: ${{ secrets.KNOCK_SERVICE_TOKEN }}
        run: knock commit create -m "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" --force

      - name: Post or update preview comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: knock-preview
          message: |
            ### Knock branch preview

            A Knock branch **`${{ steps.branch.outputs.name }}`** has been created/updated with the resources from this PR.

            **[Open in Knock dashboard →](https://dashboard.knock.app/knock-workflow-templates/${{ steps.branch.outputs.name }}/workflows)**

            > To test workflows on this branch via the API, include the header:
            > ```
            > X-Knock-Branch: ${{ steps.branch.outputs.name }}
            > ```
            >
            > _Last updated: ${{ github.event.pull_request.head.sha }}_

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Knock CLI
        run: npm install -g @knocklabs/cli@latest

      - name: Delete Knock branch
        env:
          KNOCK_SERVICE_TOKEN: ${{ secrets.KNOCK_SERVICE_TOKEN }}
        run: knock branch delete pr-${{ github.event.pull_request.number }} --force || true
